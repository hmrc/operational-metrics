include "backend.conf"

# This is the main configuration file for the application.
# ~~~~~

appName = operational-metrics

# Default http client
play.modules.enabled += "uk.gov.hmrc.play.bootstrap.HttpClientV2Module"

# Play Modules
play.modules.enabled += "uk.gov.hmrc.operationalmetrics.module.Module"
play.modules.enabled += "uk.gov.hmrc.mongo.play.PlayMongoModule"

# The application languages
# ~~~~~
play.i18n.langs = ["en"]

# Router
# ~~~~~
# Define the Router object to use for this application.
# This router will be looked up first when the application is starting up,
# so make sure this is the entry point.
# Furthermore, it's assumed your route file is named properly.
# So for an application router like `my.application.Router`,
# you may need to define a router file `conf/my.application.routes`.
# Default to Routes in the root package (and conf/routes)
# !!!WARNING!!! DO NOT CHANGE THIS ROUTER
play.http.router = prod.Routes

# Microservice specific config

mongodb {
  uri = "mongodb://localhost:27017/operational-metrics"
}

microservice {
  services {
    artefact-processor {
      host = "localhost"
      port = 9000
    }
  
    service-dependencies {
      host = "localhost"
      port = 8459
    }
    
    releases-api {
      host = "localhost"
      port = 8008
    }
  }
}

service-lead-times-updater.enabled      = false
service-lead-times-updater.interval     = 30.minutes
service-lead-times-updater.initialDelay = 1.second

aws.sqs {
  enabled = false
  deployment {
    endpointOverride    = "https://localhost.localstack.cloud:4566"
    queueUrl            = "https://sqs.eu-west-2.localhost.localstack.cloud:4566/000000000000/mdtp-deployment-events"
    maxNumberOfMessages = 1
    waitTimeSeconds     = 20
  }
}

queue {
  retryInterval = 1 minute
  ttl           = 30 days
}

servicenow.url = "https://something"

servicenow-stream {
  enabled = false
  source-tick {
    initialDelay = 1 second
    interval     = 5 seconds
  }
}

